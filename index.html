<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>Paroisse</title>
    <meta name="description" content="Plateforme vidéo de la Paroisse" />
    <meta name="author" content="Paroisse" />

    <meta property="og:title" content="Paroisse" />
    <meta property="og:description" content="Plateforme vidéo de la Paroisse" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Paroisse" />
    <meta name="twitter:image" content="/logo.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Configuration Facebook OAuth (pour tracking et analytics si nécessaire) -->
    <script>
      // CORRECTION MOBILE: Attendre que le document soit prêt et Supabase initialisé
      window.fbAsyncInit = function() {
        // La configuration réelle (ID App et version) est gérée par Supabase
        // Cette initialisation est optionnelle pour les analytics Facebook
        console.log('✅ Facebook SDK initialized');
        
        // Sur mobile, s'assurer que le SDK est pleinement prêt
        if (typeof FB !== 'undefined') {
          FB.getLoginStatus(function(response) {
            console.log('📱 Facebook login status:', response.status);
          });
        }
      };

      // Charger le SDK Facebook (optionnel avec Supabase OAuth)
      (function(d, s, id) {
        var js, fjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s); js.id = id;
        // CORRECTION MOBILE: Ajouter les paramètres pour une meilleure compatibilité mobile
        js.src = 'https://connect.facebook.net/fr_FR/sdk.js#xfbml=1&version=v24.0&appId=3041743659361307&asynchronous=true';
        js.async = true;
        fjs.parentNode.insertBefore(js, fjs);
      }(document, 'script', 'facebook-jssdk'));
      
      // CORRECTION MOBILE: Ajouter un fallback d'initialisation en cas de retard du SDK
      document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          if (typeof FB === 'undefined') {
            console.warn('⚠️ Facebook SDK n\'est pas chargé. Tentative de rechargement...');
            window.fbAsyncInit();
          }
        }, 2000);
      }, false);
    </script>
  </body>
</html>
